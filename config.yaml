app:
  name: "AI RekrutAgent"
  version: "2.0.0"

paths:
  data_dir: "data"
  output_dir: "output"
  log_file: "output/app.log"

models:
  default: "mistral"
  available:
    - "mistral"
    - "llama3"
    - "llama3.2"
    - "llama3.2:3b"
    - "gemma2"
    - "groq/llama3-8b-8192"
    - "groq/llama3-70b-8192"
    - "groq/mixtral-8x7b-32768"
    - "gemini/gemini-2.5-flash"
    - "gemini/gemini-2.5-pro"
    - "deepseek/deepseek-chat"
    - "deepseek/deepseek-coder"
